# ============================================================
# docker-compose.yml — 生产级优化版
# 日志链路：app JSON stdout → Promtail → Loki → Grafana
# ============================================================

services:
  # ── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:18.4
    container_name: smart-cs-postgres
    environment:
      POSTGRES_DB: smart_cs
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ChangeMe_2024!}
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d smart_cs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    restart: unless-stopped
    shm_size: 256m
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - smart-cs-net

  # ── Redis ─────────────────────────────────────────────
  redis:
    image: redis:8.8.0-alpine
    container_name: smart-cs-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-ChangeMe_StrongP@ss2026!}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    environment:
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-ChangeMe_StrongP@ss2026!}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 300M
        reservations:
          memory: 128M
    networks:
      - smart-cs-net

  # ── Application ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    pull_policy: build
    image: smart-customer-service:latest
    container_name: smart-cs-app
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: Asia/Shanghai
      # 数据库连接（变量名必须与 application.yml 一致）
      DATABASE_URL: jdbc:postgresql://postgres:5432/smart_cs
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-ChangeMe_2024!}
      # Redis 连接
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-ChangeMe_StrongP@ss2026!}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/liveness || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
        tag: "smart-cs-app"
    networks:
      - smart-cs-net

  # ── Loki（日志聚合存储）───────────────────────────────
  loki:
    image:  grafana/loki:3.7.2
    container_name: smart-cs-loki
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - loki_data:/loki
      - ./deploy/loki/config.yaml:/etc/loki/config.yaml:ro
    logging:
      driver: "none"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - smart-cs-net

  # ── Promtail（日志采集 Agent）──────────────────────────
  promtail:
    image: grafana/promtail:3.7.2
    container_name: smart-cs-promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./deploy/promtail/promtail-config.yaml:/etc/promtail/config.yaml:ro
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
    logging:
      driver: "none"
    restart: unless-stopped
    networks:
      - smart-cs-net

  # ── Grafana（日志可视化）──────────────────────────────
  grafana:
    image: grafana/grafana:12.4
    container_name: smart-cs-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?请在 .env 中设置 GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      TZ: Asia/Shanghai
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - smart-cs-net

volumes:
  postgres_data:
  loki_data:
  grafana_data:

networks:
  smart-cs-net:
    driver: bridge
