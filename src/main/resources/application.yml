server:
  port: ${SERVER_PORT:8080}
  tomcat:
    # 生产：限制请求头大小，防止头注入攻击
    max-http-form-post-size: 2MB
    threads:
      max: 200
      min-spare: 10

spring:
  application:
    name: smart-customer-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # PostgreSQL
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://10.211.55.20:5432/smart_cs}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: SmartCS-HikariPool
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 5000
      # 生产：连接泄漏检测（30s 内未归还则告警）
      leak-detection-threshold: 30000
      connection-test-query: SELECT 1

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2
          max-wait: 2000ms
        shutdown-timeout: 1000ms

  # Jackson 序列化配置
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# DeepSeek（密钥只从环境变量读取，不提供默认值）
deepseek:
  api-key: ${DEEPSEEK_API_KEY}
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
  model-name: ${DEEPSEEK_MODEL_NAME:deepseek-chat}
  timeout-seconds: ${DEEPSEEK_TIMEOUT_SECONDS:60}
  max-tokens: ${DEEPSEEK_MAX_TOKENS:1024}
  temperature: ${DEEPSEEK_TEMPERATURE:0.7}
  max-retries: ${DEEPSEEK_MAX_RETRIES:2}

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    # 生产：关闭慢 SQL 打印以减少日志量（可通过 log-slow-sql 单独开启）
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto
    banner: false

# 日志（详细配置见 logback-spring.xml）
logging:
  level:
    root: ${LOG_LEVEL_ROOT:WARN}
    com.shopmall.cs: ${LOG_LEVEL_APP:INFO}
    # 生产关闭 LangChain4j 请求体日志（含 API Key）
    dev.langchain4j: ${LOG_LEVEL_LC4J:WARN}
    com.zaxxer.hikari: ${LOG_LEVEL_HIKARI:WARN}
  config: classpath:logback-spring.xml

# Actuator — 生产暴露 health/info/metrics/prometheus
management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_ENDPOINTS:health,info,metrics,prometheus}
      base-path: /actuator
  endpoint:
    health:
      show-details: ${ACTUATOR_HEALTH_DETAILS:when-authorized}
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      env: ${spring.profiles.active}

# 自定义配置
cs:
  cors:
    origins: ${CORS_ORIGIN:}
  rate-limit:
    max-requests: ${RATE_LIMIT_MAX_REQUESTS:10}
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}
  session:
    expire-hours: ${SESSION_EXPIRE_HOURS:24}
    max-history: ${SESSION_MAX_HISTORY:10}
  faq:
    enabled: ${FAQ_ENABLED:true}
  emotion:
    enabled: ${EMOTION_ENABLED:true}
  # SSE 线程池配置
  sse:
    core-pool-size: ${SSE_CORE_POOL_SIZE:4}
    max-pool-size: ${SSE_MAX_POOL_SIZE:16}
    queue-capacity: ${SSE_QUEUE_CAPACITY:100}
    keep-alive-seconds: ${SSE_KEEP_ALIVE_SECONDS:60}
