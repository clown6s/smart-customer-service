# ============================================================
# Promtail 配置文件
# 采集 Docker 容器 JSON 日志 → 推送到 Loki
# ============================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ── 采集 smart-cs-app 容器日志 ─────────────────
  - job_name: smart-cs-app
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        filters:
          - name: name
            values: ["smart-cs-app"]
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        target_label: "container_name"
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: "stream"
      - source_labels: ["__meta_docker_container_id"]
        target_label: "container_id"
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            traceId: traceId
            message: message
            userId: userId
            sessionId: sessionId

  # ── 采集 smart-cs-postgres 容器日志 ─────────────
  - job_name: smart-cs-postgres
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        filters:
          - name: name
            values: ["smart-cs-postgres"]
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        target_label: "container_name"
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: "stream"

  # ── 采集 smart-cs-redis 容器日志 ───────────────
  - job_name: smart-cs-redis
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        filters:
          - name: name
            values: ["smart-cs-redis"]
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        target_label: "container_name"
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: "stream"
