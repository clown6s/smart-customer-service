# ============================================================
# Grafana datasource 自动配置
# ============================================================
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://app:8080/actuator/prometheus
    isDefault: true
    editable: true
    jsonData:
      httpMethod: GET
      timeInterval: "15s"

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceName: Loki
          matcherRegex: "traceId=(\\w+)"
          name: TraceID
          url: "$${__value.raw}"
