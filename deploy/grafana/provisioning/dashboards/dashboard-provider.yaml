# ============================================================
# Grafana dashboard provisioning 配置
# ============================================================
apiVersion: 1

providers:
  - name: "Smart Customer Service"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: false
